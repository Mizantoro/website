<!DOCTYPE html>
<html lang="en">
<head>
    <title>Pendulum</title>
    <link rel="stylesheet" href="css/pendulum.css">
    <link rel="icon" type="image/x-icon">
    <meta charset="UTF-8" name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
<h1>Pendulum</h1>
<h2>Website by Mizantoro</h2>
<a href="https://github.com/Mizantoro/website" target="_blank">Source code</a>
<div id="input_container">
    <label for="degreesInput">Degrees:</label>
    <input type="number" id="degreesInput" name="degreesInput" min="0" max="15" placeholder="0"/>
    <label for="metersInput">Meters:</label>
    <input type="number" id="metersInput" name="metersInput" min="1" placeholder="100"/>
    <label for="metersInput">Acceleration:</label>
    <input type="number" id="accelerationInput" name="accelerationInput" placeholder="9.81"/>
    <p id="period"></p>
</div>

<div id="pendulum_container">
    <div id="pendulum_root"></div>
    <div id="pendulum_radius">
        <div id="pendulum_weight"></div>
    </div>
</div>

<script src="js/pendulum.js"></script>
</body>
